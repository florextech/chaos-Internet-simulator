services:
  proxy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    environment:
      TARGET_BASE_URL: ${TARGET_BASE_URL:-https://jsonplaceholder.typicode.com}
      PROXY_PORT: 8080
      CONTROL_PORT: 8081
    ports:
      - '8080:8080'
      - '8081:8081'

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      VITE_CONTROL_API_URL: http://localhost:8081
    ports:
      - '3000:3000'
    depends_on:
      - proxy
